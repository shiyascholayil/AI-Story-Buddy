name: peblo_story_buddy
description: AI Story Buddy & Quiz Component for Peblo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Audio & TTS
  flutter_tts: ^4.2.5
  audioplayers: ^6.1.0

  # UI & Animations
  confetti: ^0.8.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utilities
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.0

  # JSON handling
  json_annotation: ^4.9.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
